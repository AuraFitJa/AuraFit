<style>
  :root{
    --bg:#070A12;
    --card: rgba(255,255,255,.06);
    --card2: rgba(255,255,255,.09);
    --text:#EAF0FF;
    --muted: rgba(234,240,255,.68);
    --line: rgba(234,240,255,.12);
    --brand1:#6D5EF3;
    --brand2:#2EE1A5;
    --brand3:#4CC9F0;
    --shadow: 0 18px 60px rgba(0,0,0,.45);
    --radius: 18px;
    --radius2: 24px;
    --max: 1160px;
    --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
    --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family: var(--sans);
    color: var(--text);
    background:
      radial-gradient(1200px 800px at 20% -10%, rgba(109,94,243,.35), transparent 55%),
      radial-gradient(1100px 700px at 90% 10%, rgba(46,225,165,.22), transparent 55%),
      radial-gradient(900px 700px at 55% 95%, rgba(76,201,240,.18), transparent 55%),
      var(--bg);
    overflow-x:hidden;
  }
  a{color:inherit; text-decoration:none}
  .container{width:100%; max-width: var(--max); margin:0 auto; padding:0 18px}

  .pill{
    display:inline-flex; align-items:center; gap:10px;
    padding:10px 12px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,.04);
    border-radius: 999px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing:.2px;
    backdrop-filter: blur(10px);
  }
  .pill b{color:var(--text)}

  .topbar{
    position: sticky; top:0; z-index:50;
    background: rgba(7,10,18,.55);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,.06); /* più soft */
  }
  .nav{
    display:flex; align-items:center; justify-content:space-between;
    height:72px;
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    font-weight: 700;
    letter-spacing:.2px;
  }
  .logo{
    width:34px;height:34px;border-radius: 10px;
    background: linear-gradient(135deg, var(--brand1), var(--brand2));
    box-shadow: 0 10px 30px rgba(109,94,243,.18);
    position:relative;
    overflow:hidden;
  }
  .logo:after{
    content:""; position:absolute; inset:-30%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.35), transparent 55%);
    transform: rotate(20deg);
  }

  .navlinks{display:flex; align-items:center; gap:16px}
  .navlinks a{
    color: var(--muted);
    padding:10px 10px;
    border-radius: 12px;
    transition: background .2s ease, color .2s ease;
    font-size: 14px;
  }
  .navlinks a:hover{background: rgba(255,255,255,.06); color: var(--text)}

  .actions{display:flex; align-items:center; gap:10px}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:10px;
    padding:12px 14px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.07); /* più soft */
    background: rgba(255,255,255,.04);
    color: var(--text);
    font-weight: 650;
    font-size: 14px;
    cursor:pointer;
    transition: transform .15s ease, background .2s ease, border-color .2s ease;
    white-space:nowrap;
  }
  .btn:hover{background: rgba(255,255,255,.07)}
  .btn:active{transform: translateY(1px)}
  .btn.primary{
    border-color: rgba(109,94,243,.55);
    background: linear-gradient(135deg, rgba(109,94,243,.9), rgba(46,225,165,.75));
    color: #061018;
    box-shadow: 0 18px 50px rgba(109,94,243,.18);
  }
  .btn.primary:hover{filter:saturate(1.06)}
  .btn.ghost{background: transparent;}

  .menuBtn{
    display:none;
    width:42px;height:42px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.07);
    background: rgba(255,255,255,.04);
    color: var(--text);
    cursor:pointer;
  }

  /* Mobile menu: MAI visibile su desktop */
  .mobileMenu{
    display:none;
    padding: 10px 0 14px;
    border-top: 1px solid rgba(255,255,255,.06); /* più soft */
  }
  @media (min-width: 981px){
    .mobileMenu{ display:none !important; }
  }
  @media (max-width: 980px){
    .mobileMenu.open{ display:block; }
  }

  /* Hero */
  .hero{ padding: 64px 0 26px; }
  .heroGrid{
    display:grid;
    grid-template-columns: 1.1fr .9fr;
    gap: 22px;
    align-items: start;
  }
  h1{
    margin: 18px 0 10px;
    font-size: clamp(34px, 4.6vw, 58px);
    line-height: 1.02;
    letter-spacing: -0.02em;
  }
  .lead{
    margin: 0 0 18px;
    color: var(--muted);
    font-size: clamp(15px, 1.25vw, 18px);
    line-height: 1.55;
    max-width: 56ch;
  }
  .heroCtas{display:flex; flex-wrap:wrap; gap:10px; margin-top: 18px}
  .micro{
    margin-top: 14px;
    display:flex; flex-wrap:wrap; gap:10px;
    color: rgba(234,240,255,.62);
    font-size: 13px;
  }
  .micro span{
    border: 1px solid rgba(255,255,255,.07); /* più soft */
    padding: 8px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,.03);
  }

  /* Panels / Cards: niente bordi “netti”, ma inset soft per mantenere l’effetto */
  .panel,
  .card,
  .callout,
  .priceCard,
  .faq{
    border: none;
    box-shadow:
      0 10px 40px rgba(0,0,0,.35),
      inset 0 0 0 1px rgba(255,255,255,.04);
  }

  .panel{
    background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    border-radius: var(--radius2);
    overflow:hidden;
  }
  .panelTop{
    padding: 18px 18px 0;
    display:flex; align-items:center; justify-content:space-between;
    gap:14px;
  }
  .panelTitle{
    font-weight: 700;
    letter-spacing:.2px;
    display:flex; align-items:center; gap:10px;
  }
  .dot{
    width:10px;height:10px;border-radius:99px;
    background: var(--brand2);
    box-shadow: 0 0 0 6px rgba(46,225,165,.12);
  }
  .panelBody{padding: 16px 18px 18px}

  .mock{
    border: none;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    border-radius: 16px;
    background: rgba(7,10,18,.45);
    overflow:hidden;
  }
  .mockHeader{
    display:flex; align-items:center; gap:8px;
    padding: 12px 14px;
    border-bottom: 1px solid rgba(255,255,255,.06); /* più soft */
    color: rgba(234,240,255,.65);
    font-size: 12px;
  }
  .bubble{width:10px;height:10px;border-radius:99px; background: rgba(234,240,255,.22)}
  .mockGrid{
    padding: 14px;
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .tile{
    border: none;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    background: rgba(255,255,255,.04);
    border-radius: 16px;
    padding: 14px;
    min-height: 110px;
    position:relative;
    overflow:hidden;
  }
  .tile:after{
    content:"";
    position:absolute; inset:-40%;
    background: radial-gradient(circle at 30% 30%, rgba(109,94,243,.25), transparent 55%);
    transform: rotate(18deg);
    pointer-events:none;
  }
  .kpi{
    font-family: var(--mono);
    font-size: 12px;
    color: rgba(234,240,255,.70);
    margin-bottom: 8px;
    position:relative;
    z-index:1;
  }
  .big{
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.02em;
    position:relative;
    z-index:1;
  }
  .small{
    margin-top: 6px;
    color: rgba(234,240,255,.70);
    font-size: 13px;
    position:relative;
    z-index:1;
  }

  /* Sections: aggiunge “fade” tra sezioni per eliminare le bande orizzontali */
  section{
    padding: 56px 0;
    position: relative;
  }
  section::before{
    content:"";
    position:absolute;
    left:0; right:0; top:-44px;
    height:44px;
    background: linear-gradient(to bottom, transparent, rgba(7,10,18,.65));
    pointer-events:none;
  }

  .sectionHead{
    display:flex; align-items:flex-end; justify-content:space-between; gap:16px;
    margin-bottom: 18px;
  }
  .sectionHead h2{
    margin:0;
    font-size: clamp(22px, 2.3vw, 34px);
    letter-spacing: -0.01em;
  }
  .sectionHead p{
    margin:0;
    color: var(--muted);
    max-width: 62ch;
    line-height: 1.5;
    font-size: 14.5px;
  }

  .grid3{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  .card{
    background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    border-radius: var(--radius);
    padding: 18px;
    backdrop-filter: blur(14px);
  }
  .card .icon{
    width:42px;height:42px;border-radius: 14px;
    display:grid; place-items:center;
    background: rgba(255,255,255,.06);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    margin-bottom: 12px;
  }
  .card h3{margin:0 0 8px; font-size: 16px}
  .card p{margin:0; color: var(--muted); line-height: 1.6; font-size: 14px}

  .split{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    align-items: stretch;
  }
  .list{
    margin: 0;
    padding-left: 18px;
    color: var(--muted);
    line-height: 1.75;
    font-size: 14px;
  }
  .callout{
    background: linear-gradient(135deg, rgba(109,94,243,.18), rgba(46,225,165,.10));
    border-radius: var(--radius2);
    padding: 18px;
  }
  .callout h3{margin:0 0 6px}
  .callout p{margin:0; color: var(--muted); line-height:1.6}

  /* Pricing */
  .pricing{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  .priceCard{
    background: rgba(255,255,255,.04);
    border-radius: var(--radius2);
    padding: 18px;
    position:relative;
    overflow:hidden;
  }
  .badge{
    display:inline-flex; align-items:center;
    font-size: 12px;
    color: rgba(6,16,24,.92);
    background: linear-gradient(135deg, rgba(109,94,243,.9), rgba(46,225,165,.75));
    padding: 6px 10px;
    border-radius: 999px;
    font-weight: 700;
  }
  .price{
    margin-top: 12px;
    font-size: 34px;
    font-weight: 900;
    letter-spacing: -0.02em;
  }
  .price small{font-size: 14px; color: rgba(234,240,255,.65); font-weight: 600}
  .hr{
    height:1px;
    background: rgba(255,255,255,.06); /* più soft */
    margin: 14px 0
  }
  .ul{
    list-style:none; padding:0; margin:0;
    display:grid; gap:10px;
    color: rgba(234,240,255,.72);
    font-size: 14px;
    line-height:1.35;
  }
  .ul li{display:flex; gap:10px}
  .check{
    width:18px;height:18px;border-radius: 6px;
    background: rgba(46,225,165,.18);
    box-shadow: inset 0 0 0 1px rgba(46,225,165,.35);
    display:grid; place-items:center;
    flex: 0 0 auto;
    margin-top: 1px;
  }

  /* FAQ */
  .faq{
    border-radius: var(--radius2);
    overflow:hidden;
    background: rgba(255,255,255,.03);
  }
  .faqItem{border-top: 1px solid rgba(255,255,255,.06)} /* più soft */
  .faqItem:first-child{border-top:0}
  .faqQ{
    width:100%;
    text-align:left;
    padding: 16px 16px;
    background: transparent;
    border:0;
    color: var(--text);
    display:flex; align-items:center; justify-content:space-between;
    font-weight: 700;
    font-size: 14.5px;
    cursor:pointer;
  }
  .faqA{
    padding: 0 16px 16px;
    color: var(--muted);
    line-height: 1.7;
    font-size: 14px;
    display:none;
  }
  .faqItem.open .faqA{display:block}
  .chev{opacity:.7}

  /* Footer: niente linea netta */
  footer{
    padding: 34px 0 46px;
    border-top: 1px solid rgba(255,255,255,.06); /* più soft */
    color: rgba(234,240,255,.65);
  }
  .footGrid{
    display:grid;
    grid-template-columns: 1.2fr .8fr .8fr;
    gap: 14px;
    align-items:start;
  }
  .footGrid a{color: rgba(234,240,255,.72)}
  .footGrid a:hover{color: var(--text)}
  .fineprint{
    margin-top: 18px;
    font-size: 12.5px;
    color: rgba(234,240,255,.52);
    line-height: 1.6;
  }

  /* Mobile */
  @media (max-width: 980px){
    .heroGrid{grid-template-columns: 1fr}
    .panel{order:2}
    .grid3{grid-template-columns: 1fr}
    .split{grid-template-columns: 1fr}
    .pricing{grid-template-columns: 1fr}
    .footGrid{grid-template-columns: 1fr}
    .navlinks{display:none}
    .menuBtn{display:inline-grid; place-items:center}

    .mobileMenu a{
      display:block;
      padding: 12px 10px;
      border-radius: 12px;
      color: var(--muted);
    }
    .mobileMenu a:hover{background: rgba(255,255,255,.05); color: var(--text)}
    .actions .btn.ghost{display:none}
  }
</style>
